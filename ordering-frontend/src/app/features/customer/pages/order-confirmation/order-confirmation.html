<ng-container *ngIf="order() as o; else empty">
	<main class="page">
		<div class="banner" aria-hidden="true"></div>

		<div class="container">
			<div class="hero">
				<div class="hero-icon" aria-hidden="true">👨‍🍳</div>
				<h1>{{ title() }}</h1>
				<p class="subtitle">{{ subtitle() }}</p>
			</div>

			<div class="progress" role="group" aria-label="Stato ordine">
				<ng-container *ngFor="let s of steps; let i = index">
					<div class="dot" [class.done]="i <= activeIndex()" aria-hidden="true"></div>
					<div class="line" *ngIf="i < steps.length - 1" [class.done]="i < activeIndex()" aria-hidden="true"></div>
				</ng-container>
			</div>

			<div class="step-labels" aria-hidden="true">
				<span class="step-label" *ngFor="let s of steps; let i = index" [class.done]="i <= activeIndex()">
					{{ s }}
				</span>
			</div>

			<section class="receipt-card" aria-label="Riepilogo ordine">
				<header class="receipt-header">
					<div class="receipt-title">Riepilogo ordine</div>
					<div class="receipt-rule" aria-hidden="true"></div>
				</header>

				<div class="receipt-items">
					<article class="receipt-item" *ngFor="let it of o.items; trackBy: trackByItem">
						<div class="receipt-item-top">
							<div class="receipt-item-name">{{ it.quantity }}x {{ it.name }}</div>
							<div class="receipt-item-price">{{ euro(it.unitPriceCents * it.quantity) }}</div>
						</div>

						<div class="receipt-item-modifiers" *ngIf="it.modifierGroups?.length">
							<div class="receipt-modifier-group" *ngFor="let group of it.modifierGroups">
								<div class="receipt-modifier-group-name">{{ group.groupName }}</div>
								<div class="receipt-modifier-options">
									<span *ngFor="let option of group.optionNames">{{ option }}</span>
								</div>
							</div>
						</div>
					</article>
				</div>

				<div class="receipt-summary">
					<div class="receipt-row receipt-row--subtotal">
						<span>Subtotale</span>
						<strong>{{ euro(subtotalCents()) }}</strong>
					</div>

					<div class="receipt-total-rule" aria-hidden="true"></div>

					<div class="receipt-row receipt-row--total">
						<span>TOTALE</span>
						<strong>{{ euro(subtotalCents()) }}</strong>
					</div>
				</div>
			</section>

			<button class="new-btn" type="button" (click)="newOrder()">Nuovo ordine</button>
		</div>
	</main>
</ng-container>

<ng-template #empty>
	<div class="empty">
		<div class="empty-inner">
			<p>Nessun ordine attivo.</p>
			<button class="new-btn" type="button" (click)="newOrder()">Vai al menu</button>
		</div>
	</div>
</ng-template>
