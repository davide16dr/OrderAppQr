<div class="backdrop" *ngIf="showBackdrop" (click)="close.emit()"></div>

<section class="sheet" role="dialog" aria-modal="true" aria-label="Carrello">
  <header class="sheet-header">
    <div class="title">
      <div class="title-icon" aria-hidden="true">🛒</div>
      <div>
        <div class="title-text">Il tuo ordine</div>
        <div class="title-sub">{{ lines.length }} articolo{{ lines.length === 1 ? '' : 'i' }}</div>
      </div>
    </div>

    <button class="close-btn" type="button" (click)="close.emit()" aria-label="Chiudi carrello">
      ✕
    </button>
  </header>

  <div class="sheet-body">
    <article class="line" *ngFor="let line of lines; trackBy: trackByProductId">
      <div class="thumb" aria-hidden="true">
        <img *ngIf="line.imageUrl" [src]="line.imageUrl" [alt]="line.name" loading="lazy" />
        <div class="thumb-fallback" *ngIf="!line.imageUrl">{{ line.icon || '🍽️' }}</div>
      </div>

      <div class="line-main">
        <div class="line-name">{{ line.name }}</div>
        <div class="line-price-row">
          <span class="unit-price">{{ euro(line.unitPriceCents) }} cad.</span>
          <span class="line-total" *ngIf="line.quantity > 1">= {{ euro(line.unitPriceCents * line.quantity) }}</span>
        </div>

        <section class="modifiers" *ngIf="line.modifierGroups?.length">
          <div class="modifier-group" *ngFor="let g of line.modifierGroups; trackBy: trackByGroupId">
            <div class="modifier-title">
              <span class="modifier-name">{{ g.name }}</span>
              <span class="modifier-meta" *ngIf="g.required">Obbligatorio</span>
            </div>

            <div class="modifier-options">
              <label class="modifier-option" *ngFor="let opt of g.options; trackBy: trackByOptionId">
                <input
                  class="modifier-input"
                  [type]="optionControlType(g)"
                  [name]="'g-' + line.lineKey + '-' + g.id"
                  [checked]="isOptionSelected(line, opt.id)"
                  (change)="toggleModifierOption.emit({ lineKey: line.lineKey, groupId: g.id, optionId: opt.id })"
                />
                <span class="modifier-label">{{ opt.name }}</span>
                <span class="modifier-delta" *ngIf="opt.priceDeltaCents">{{ deltaLabel(opt.priceDeltaCents) }}</span>
              </label>
            </div>
          </div>
        </section>
      </div>

      <div class="line-controls">
        <button
          class="trash-btn"
          type="button"
          aria-label="Rimuovi"
          (click)="removeLine.emit(line.lineKey)"
        >🗑️</button>

        <div class="stepper" role="group" aria-label="Quantità">
          <button class="step minus" type="button" (click)="decrement.emit(line.lineKey)" aria-label="Diminuisci">−</button>
          <span class="qty" aria-label="Quantità attuale">{{ line.quantity }}</span>
          <button class="step plus" type="button" (click)="increment.emit(line.lineKey)" aria-label="Aumenta">+</button>
        </div>
      </div>
    </article>

    <div class="note">
      <label class="note-label" for="note">
        <span aria-hidden="true">📝</span> Note per lo staff
      </label>
      <textarea
        id="note"
        class="note-input"
        rows="3"
        [value]="note"
        (input)="onNoteInput($event)"
        placeholder="Es: senza ghiaccio, allergie..."
      ></textarea>
    </div>
  </div>

  <footer class="sheet-footer">
    <div class="total-row">
      <span class="total-label">Totale</span>
      <strong class="total-value">{{ euro(totalCents) }}</strong>
    </div>

    <button class="submit-btn" type="button" (click)="submit.emit()" [disabled]="lines.length === 0">
      Invia ordine
    </button>
  </footer>
</section>
