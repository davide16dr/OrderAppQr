<header class="header">
  <div class="banner-wrap">
    <div class="banner" aria-hidden="true">
      @if (context.businessBannerDataUrl) {
        <img [src]="context.businessBannerDataUrl" alt="" class="banner-img" />
      }
    </div>
    <div class="logo" aria-hidden="true">
      <img *ngIf="context.businessLogoDataUrl; else logoFallback" [src]="context.businessLogoDataUrl" alt="Logo azienda" />
      <ng-template #logoFallback>
        {{ context.businessAvatarText || context.businessName.charAt(0) }}
      </ng-template>
    </div>
  </div>

  <div class="identity">
    <div class="business-name">{{ context.businessName }}</div>
    <div class="status-pill" [class.active]="context.statusVariant === 'active'">
      <span class="status-dot" aria-hidden="true"></span>
      <span>{{ context.statusLabel }}</span>
    </div>
  </div>

  <div class="location-row" role="region" aria-label="Posizione">
    <div class="location-icon" aria-hidden="true">📍</div>
    <div class="location-text">
      <div class="location-name">{{ context.locationTitle }}</div>
      <div class="location-sub" *ngIf="context.locationSubtitle">{{ context.locationSubtitle }}</div>
    </div>
  </div>
</header>
