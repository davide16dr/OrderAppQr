<article class="card" [class.in-cart]="quantity > 0">
  <button
    type="button"
    class="thumb"
    (click)="add.emit()"
    [attr.aria-label]="'Visualizza ' + product.name"
  >
    @if (product.imageUrl) {
      <img [src]="product.imageUrl" [alt]="product.name" loading="lazy" />
    } @else {
      <div class="thumb-fallback">{{ product.icon || '🍽️' }}</div>
    }
  </button>

  <div class="main">
    <div class="name">{{ product.name }}</div>
    @if (product.description) {
      <div class="desc">{{ product.description }}</div>
    }
    <div class="price">{{ euro(product.priceCents) }}</div>
  </div>

  <div class="actions">
    @if (hasModifiers) {
      <button
        class="add-btn add-btn--label"
        type="button"
        (click)="add.emit()"
        [attr.aria-label]="'Personalizza ' + product.name"
      >
        <span>Personalizza</span>
      </button>
    } @else {
      @if (quantity <= 0) {
        <button
          class="add-btn"
          type="button"
          (click)="add.emit()"
          [attr.aria-label]="'Aggiungi ' + product.name"
        >
          <span aria-hidden="true">+</span>
        </button>
      } @else {
        <div class="stepper" role="group" [attr.aria-label]="'Quantità di ' + product.name">
          <button
            class="step-btn minus"
            type="button"
            (click)="decrement.emit()"
            aria-label="Diminuisci"
          >
            <span aria-hidden="true">−</span>
          </button>
          <span class="qty">{{ quantity }}</span>
          <button
            class="step-btn plus"
            type="button"
            (click)="increment.emit()"
            aria-label="Aumenta"
          >
            <span aria-hidden="true">+</span>
          </button>
        </div>
      }
    }
  </div>
</article>
