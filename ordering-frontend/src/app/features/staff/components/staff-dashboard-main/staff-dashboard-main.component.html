<div class="sdm-shell">

  <!-- Top bar -->
  <header class="sdm-header">
    <div class="sdm-header-left">
      <h1 class="sdm-title">{{ sectionTitle }}</h1>
    </div>
    @if (activeSection === 'overview') {
      <button type="button" class="sdm-btn-refresh" (click)="refresh()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
          <path d="M16 16h5v5"/>
        </svg>
        Aggiorna
      </button>
    }
  </header>

  <!-- Section content -->
  <div class="sdm-content" [@fadeIn]>
    @if (!isLoading && currentUser) {
      @switch (activeSection) {
        @case ('overview') {
          <app-dashboard-main [refreshTrigger]="refreshCount"></app-dashboard-main>
        }
        @case ('orders') {
          <app-orders-by-hour></app-orders-by-hour>
        }
        @case ('revenue') {
          <app-weekly-revenue></app-weekly-revenue>
        }
        @case ('products') {
          <app-top-products></app-top-products>
        }
        @case ('areas') {
          <app-area-management></app-area-management>
        }
        @case ('stations') {
          <app-station-management></app-station-management>
        }
      }
    }

    @if (isLoading) {
      <div class="sdm-loading">
        <div class="sdm-spinner"></div>
        <p>Caricamento dashboard…</p>
      </div>
    }
  </div>

</div>
