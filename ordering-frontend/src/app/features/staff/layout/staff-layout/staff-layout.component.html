<div class="staff-shell" [class.sidebar-open]="isSidebarOpen()">
  @if (isSidebarOpen()) {
    <button type="button" class="sidebar-backdrop" aria-label="Chiudi menu" (click)="closeSidebar()"></button>
  }

  <app-staff-sidebar
    [currentUser]="currentUser()"
    [mobileOpen]="isSidebarOpen()"
    (logout)="onLogout()"
    (navigate)="closeSidebar()"
  ></app-staff-sidebar>

  <div class="staff-content">
    <app-staff-topbar
      [currentUser]="currentUser()"
      [sidebarOpen]="isSidebarOpen()"
      (menuToggle)="toggleSidebar()"
    ></app-staff-topbar>
    <main class="staff-page-container">
      <router-outlet></router-outlet>
    </main>
  </div>

  <div class="order-toasts" aria-live="polite">
    @for (toast of toasts(); track toast.id) {
      <div class="order-toast">
        <svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="toast-text">Nuovo ordine #{{ toast.tenantSeq }}</span>
        <button type="button" class="toast-close" (click)="dismissToast(toast.id)" aria-label="Chiudi">×</button>
      </div>
    }
  </div>
</div>
