<div class="tenant-edit">
  <div class="edit-header">
    <h2>Modifica Tenant</h2>
    <p class="edit-subtitle">Aggiorna le informazioni del tenant</p>
  </div>

  <!-- Success Message -->
  <div *ngIf="success()" class="success-alert">
    ✓ Tenant salvato con successo! Reindirizzamento...
  </div>

  <!-- Error Message -->
  <div *ngIf="error()" class="error-alert">
    ✕ {{ error() }}
  </div>

  <!-- Loading State -->
  <div *ngIf="loading()" class="loading-state">
    <div class="spinner"></div>
    <p>Caricamento dati...</p>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="save()" *ngIf="!loading()" class="edit-form">
    <div class="form-group">
      <label for="name" class="form-label">Nome Tenant *</label>
      <input 
        id="name"
        formControlName="name" 
        type="text"
        class="form-input"
        placeholder="Es. Lido Azzurro"
        [disabled]="saving()"
      />
      <span *ngIf="form.get('name')?.hasError('required')" class="form-error">
        Nome è obbligatorio
      </span>
    </div>

    <div class="form-group">
      <label for="slug" class="form-label">Slug *</label>
      <input 
        id="slug"
        formControlName="slug" 
        type="text"
        class="form-input"
        placeholder="Es. lido-azzurro"
        [disabled]="saving()"
      />
      <span *ngIf="form.get('slug')?.hasError('required')" class="form-error">
        Slug è obbligatorio
      </span>
    </div>

    <div class="form-group">
      <label for="subdomain" class="form-label">Subdomain *</label>
      <input 
        id="subdomain"
        formControlName="subdomain" 
        type="text"
        class="form-input"
        placeholder="Es. lido-azzurro"
        [disabled]="saving()"
      />
      <span *ngIf="form.get('subdomain')?.hasError('required')" class="form-error">
        Subdomain è obbligatorio
      </span>
    </div>

    <div class="form-group">
      <label for="country" class="form-label">Paese</label>
      <input 
        id="country"
        formControlName="country" 
        type="text"
        class="form-input"
        placeholder="Es. Italy"
        [disabled]="saving()"
      />
    </div>

    <div class="form-actions">
      <button 
        type="submit" 
        class="btn-save"
        [disabled]="form.invalid || saving()"
      >
        {{ saving() ? '⏳ Salvataggio...' : '✓ Salva' }}
      </button>
      <button 
        type="button" 
        class="btn-cancel"
        (click)="cancel()"
        [disabled]="saving()"
      >
        ✕ Annulla
      </button>
    </div>
  </form>
</div>
