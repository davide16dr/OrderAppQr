version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: orderapp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ordering_db}
      POSTGRES_USER: ${DB_USER:-orderapp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orderapp_password_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - orderapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-orderapp_user} -d ${POSTGRES_DB:-ordering_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: orderapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - orderapp-network
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./ordering-system
      dockerfile: Dockerfile
    container_name: orderapp-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ordering_db}
      DB_USER: ${DB_USER:-orderapp_user}
      DB_PASSWORD: ${DB_PASSWORD:-orderapp_password_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-DevSecretKeyForJWTTokenGenerationLocalEnvironment2026}
      STORAGE_ENABLED: ${STORAGE_ENABLED:-false}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-orderapp}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      SPRING_MAIL_HOST: ${APP_MAIL_HOST:-mailhog}
      SPRING_MAIL_PORT: ${APP_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${APP_MAIL_USERNAME:-dev}
      SPRING_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-dev}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - orderapp-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: orderapp-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - orderapp-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mail Testing (Mailhog)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: orderapp-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - orderapp-network

  # Frontend (Angular — build statica servita da Nginx)
  frontend:
    build:
      context: ./ordering-frontend
      dockerfile: Dockerfile
    container_name: orderapp-frontend
    networks:
      - orderapp-network
    depends_on:
      - backend

  # Reverse proxy + HTTPS automatico
  caddy:
    image: caddy:2-alpine
    container_name: orderapp-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - orderapp-network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  orderapp-network:
    driver: bridge
