# Production Profile Configuration
# Usa: java -jar app.jar --spring.profiles.active=prod

spring:
  application:
    name: ordering-system

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ordering_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour in milliseconds
    cache-names:
      - allTenants
      - tenantById
      - tenantAreas
      - categories

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    ssl: ${REDIS_SSL:false}
    timeout: 2000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  mail:
    host: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:smtp.gmail.com}}
    port: ${APP_MAIL_PORT:${SPRING_MAIL_PORT:587}}
    username: ${APP_MAIL_USERNAME:${SPRING_MAIL_USERNAME:}}
    password: ${APP_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
    protocol: ${APP_MAIL_PROTOCOL:${SPRING_MAIL_PROTOCOL:smtp}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:smtp.gmail.com}}
          ssl.protocols: TLSv1.2
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000  # 24 hours
    refreshExpiration: 604800000  # 7 days
  
  mail:
    from: ${APP_MAIL_FROM:${MAIL_FROM:noreply@orderapp.com}}

logging:
  level:
    com.orderapp.ordering: INFO
    org.springframework: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ordering-system.log
    max-size: 100MB
    max-history: 30
