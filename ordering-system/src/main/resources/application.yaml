spring:
  application:
    name: ordering-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ordering_db
    username: davideranavolo
    password: ""

  jpa:
    mail:
      from: ${APP_MAIL_FROM:${MAIL_FROM:no-reply@orderapp.local}}
      provider: ${APP_MAIL_PROVIDER:}
      resend:
        api-key: ${RESEND_API_KEY:}
        endpoint: ${RESEND_API_ENDPOINT:https://api.resend.com/emails}
    hibernate:
      ddl-auto: none
    show-sql: false

    baselineOnMigrate: true
    repair: true

  mail:
    host: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:}}
    port: ${APP_MAIL_PORT:${SPRING_MAIL_PORT:587}}
    username: ${APP_MAIL_USERNAME:${SPRING_MAIL_USERNAME:}}
    password: ${APP_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
    protocol: ${APP_MAIL_PROTOCOL:${SPRING_MAIL_PROTOCOL:smtp}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:}}
          ssl.protocols: TLSv1.2
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000

server:
  port: ${SERVER_PORT:${PORT:8080}}
  address: 0.0.0.0
app:
  mail:
    from: ${APP_MAIL_FROM:${MAIL_FROM:no-reply@orderapp.local}}
    provider: ${APP_MAIL_PROVIDER:}
    resend:
      api-key: ${RESEND_API_KEY:}
      endpoint: ${RESEND_API_ENDPOINT:https://api.resend.com/emails}
  jwt:
    secret: ${JWT_SECRET:OrderAppSecretKeyForJWTTokenGenerationAndValidation2024OrderQRSuperSecureKey}
    expiration: 86400000  # 24 hours in milliseconds
    refreshExpiration: 604800000  # 7 days in milliseconds
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    frontend-url: ${FRONTEND_URL:http://localhost:4200}
  storage:
    enabled: ${STORAGE_ENABLED:false}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:orderapp}
      public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
