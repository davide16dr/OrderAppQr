spring:
  application:
    name: ordering-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ordering_db
    username: davideranavolo
    password: ""

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    repair: true

  mail:
    host: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:}}
    port: ${APP_MAIL_PORT:${SPRING_MAIL_PORT:587}}
    username: ${APP_MAIL_USERNAME:${SPRING_MAIL_USERNAME:}}
    password: ${APP_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
    protocol: ${APP_MAIL_PROTOCOL:${SPRING_MAIL_PROTOCOL:smtp}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:}}
          ssl.protocols: TLSv1.2
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000

server:
  port: 8080
app:
  jwt:
    secret: OrderAppSecretKeyForJWTTokenGenerationAndValidation2024OrderQRSuperSecureKey
    expiration: 86400000  # 24 hours in milliseconds
    refreshExpiration: 604800000  # 7 days in milliseconds

  mail:
    from: ${APP_MAIL_FROM:${MAIL_FROM:no-reply@orderapp.local}}
