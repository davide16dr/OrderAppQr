# Docker Profile Configuration
# Used when running in Docker Compose with spring.profiles.active=docker

spring:
    from: ${APP_MAIL_FROM:${MAIL_FROM:dev@orderapp.docker}}
  application:
    name: ordering-system

  profiles:
    active: docker

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/ordering_db}
    username: ${DB_USER:orderapp_user}
    password: ${DB_PASSWORD:orderapp_password_dev}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  cache:
    type: redis
    redis:
      time-to-live: 3600000
    cache-names:
      - allTenants
      - tenantById
      - tenantAreas
      - categories

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    ssl: false
    timeout: 2000
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 2

  mail:
    host: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:mailhog}}
    port: ${APP_MAIL_PORT:${SPRING_MAIL_PORT:1025}}
    username: ${APP_MAIL_USERNAME:${SPRING_MAIL_USERNAME:dev}}
    password: ${APP_MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:dev}}
    protocol: ${APP_MAIL_PROTOCOL:${SPRING_MAIL_PROTOCOL:smtp}}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          ssl:
            trust: ${APP_MAIL_HOST:${SPRING_MAIL_HOST:mailhog}}
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    baselineVersion: 0
    repair: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:${PORT:8080}}
  address: 0.0.0.0
  servlet:
    context-path: /
  error:
    include-stacktrace: never
    include-message: never

app:
  mail:
    from: ${APP_MAIL_FROM:${MAIL_FROM:dev@orderapp.docker}}
    provider: ${APP_MAIL_PROVIDER:}
    resend:
      api-key: ${RESEND_API_KEY:}
      endpoint: ${RESEND_API_ENDPOINT:https://api.resend.com/emails}
  jwt:
    secret: ${JWT_SECRET:DevSecretKeyForJWTTokenGenerationLocalEnvironment2026}
    expiration: 86400000
    refreshExpiration: 604800000
  customer-base-url: ${CUSTOMER_BASE_URL:https://tuodominio.com/customer/menu}
  storage:
    enabled: ${STORAGE_ENABLED:false}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:orderapp}
      public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

logging:
  level:
    root: WARN
    com.orderapp.ordering: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
